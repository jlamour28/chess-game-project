<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Chess Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            padding: 25px;
            max-width: 95vw;
            width: 700px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 2.2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .game-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 10px;
        }

        .game-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .status {
            font-size: 1.2em;
            font-weight: bold;
            color: #2c3e50;
        }

        .game-mode-selector {
            display: flex;
            gap: 10px;
        }

        .mode-btn {
            padding: 8px 16px;
            border: 2px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            background: #007bff;
            color: white;
        }

        .mode-btn:hover {
            background: #0056b3;
            color: white;
            border-color: #0056b3;
        }

        .control-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .new-game-btn {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .new-game-btn:hover {
            background: linear-gradient(135deg, #218838, #1dd1a1);
            transform: translateY(-2px);
        }

        .undo-btn {
            background: linear-gradient(135deg, #6c757d, #5a6268);
            color: white;
        }

        .undo-btn:hover {
            background: linear-gradient(135deg, #545b62, #4e555b);
            transform: translateY(-2px);
        }

        .ai-move-btn {
            background: linear-gradient(135deg, #fd7e14, #e55a2b);
            color: white;
            display: none;
        }

        .ai-move-btn:hover {
            background: linear-gradient(135deg, #e8690b, #d4481f);
            transform: translateY(-2px);
        }

        .difficulty-selector {
            padding: 8px 12px;
            border: 2px solid #ced4da;
            border-radius: 6px;
            background: white;
            font-size: 0.9em;
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            border: 4px solid #8B4513;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .square {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .square.light { background: linear-gradient(135deg, #F0D9B5, #E6C29A); }
        .square.dark  { background: linear-gradient(135deg, #B58863, #A0724E); }

        .square:hover { transform: scale(1.02); z-index: 10; }

        .square.selected   { box-shadow: inset 0 0 0 4px #FFD700; z-index: 15; }
        .square.last-move  { box-shadow: inset 0 0 0 4px #FFC107; }

        .square.check {
            animation: checkPulse 1s infinite;
        }

        @keyframes checkPulse {
            0%, 100% { box-shadow: inset 0 0 0 4px #dc3545; }
            50%       { box-shadow: inset 0 0 0 8px rgba(220,53,69,0.5); }
        }

        .square.possible-move::after {
            content: '';
            position: absolute;
            width: 28%;
            height: 28%;
            background: rgba(40, 167, 69, 0.65);
            border-radius: 50%;
            pointer-events: none;
        }

        .square.possible-move.has-piece::after {
            width: 100%;
            height: 100%;
            border-radius: 0;
            background: rgba(40, 167, 69, 0.3);
            border: 3px solid rgba(40, 167, 69, 0.7);
        }

        .piece {
            font-size: 3.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            user-select: none;
            line-height: 1;
        }

        .game-history {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 10px;
        }

        .history-title {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .move-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 120px;
            overflow-y: auto;
        }

        .move-item {
            background: white;
            padding: 4px 9px;
            border-radius: 5px;
            border: 1px solid #dee2e6;
            font-size: 0.9em;
            font-family: monospace;
        }

        .move-item.white-move { color: #2c3e50; }
        .move-item.black-move { color: #6c757d; }

        @media (max-width: 768px) {
            .game-container { padding: 15px; width: 100%; }
            .game-controls { flex-direction: column; gap: 15px; align-items: stretch; }
            .game-mode-selector { justify-content: center; }
            .control-buttons { justify-content: center; flex-wrap: wrap; }
            .piece { font-size: 2.5em; }
            h1 { font-size: 1.8em; }
        }

        @media (max-width: 480px) {
            .chess-board { max-width: 90vw; }
            .piece { font-size: 2em; }
            .game-mode-selector { flex-direction: column; }
            .control-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>♟️ Advanced Chess Game</h1>

        <div class="game-controls">
            <div class="game-info">
                <div class="status" id="game-status">White to move</div>
                <div class="game-mode-selector">
                    <button class="mode-btn active" onclick="setGameMode('human', event)">Human vs Human</button>
                    <button class="mode-btn"        onclick="setGameMode('ai', event)">Human vs AI</button>
                </div>
            </div>

            <div class="control-buttons">
                <select class="difficulty-selector" id="ai-difficulty" onchange="changeDifficulty()">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
                <button class="ai-move-btn" onclick="makeAIMove()" id="ai-move-btn">AI Move</button>
                <button class="undo-btn"    onclick="undoMove()">Undo</button>
                <button class="new-game-btn" onclick="newGame()">New Game</button>
            </div>
        </div>

        <div class="chess-board" id="chess-board"></div>

        <div class="game-history">
            <div class="history-title">Move History:</div>
            <div class="move-list" id="move-history"></div>
        </div>
    </div>

    <script>
        // ── Piece symbols ─────────────────────────────────────────────────────
        const SYMBOLS = {
            w: { k:'♔', q:'♕', r:'♖', b:'♗', n:'♘', p:'♙' },
            b: { k:'♚', q:'♛', r:'♜', b:'♝', n:'♞', p:'♟' }
        };

        // ── ChessGame: thin wrapper around chess.js + AI ─────────────────────
        class ChessGame {
            constructor() {
                this._chess = new Chess();
                this.lastMove   = null;  // { from, to }
                this.moveHistory = [];   // SAN strings
                this.gameMode   = 'human';
                this.difficulty = 'medium';
                this._depths    = { easy: 2, medium: 3, hard: 4 };
            }

            reset() {
                this._chess = new Chess();
                this.lastMove    = null;
                this.moveHistory = [];
            }

            // Returns true if move was legal and applied
            makeMove(from, to) {
                const result = this._chess.move({ from, to, promotion: 'q' });
                if (!result) return false;
                this.lastMove = { from, to };
                this.moveHistory.push(result.san);
                return true;
            }

            // Undo last half-move; returns true on success
            undo() {
                if (!this._chess.undo()) return false;
                this.moveHistory.pop();
                this.lastMove = null;
                return true;
            }

            // Returns verbose move objects for the given square
            legalMovesFrom(square) {
                return this._chess.moves({ square, verbose: true });
            }

            turn()      { return this._chess.turn(); }          // 'w' or 'b'
            gameOver()  { return this._chess.game_over(); }
            inCheck()   { return this._chess.in_check(); }

            statusText() {
                if (this._chess.in_checkmate()) {
                    return `Checkmate! ${this._chess.turn() === 'w' ? 'Black' : 'White'} wins!`;
                }
                if (this._chess.in_stalemate()) return "Stalemate — draw.";
                if (this._chess.in_draw())      return "Draw!";
                if (this._chess.in_check()) {
                    return `${this._chess.turn() === 'w' ? 'White' : 'Black'} is in check!`;
                }
                return `${this._chess.turn() === 'w' ? 'White' : 'Black'} to move`;
            }

            // Returns the chess.js board 2D array (8×8, row 0 = rank 8)
            board() { return this._chess.board(); }

            // ── AI: negamax with alpha-beta pruning ───────────────────────────
            getAIMove() {
                const depth = this._depths[this.difficulty];
                const moves = this._chess.moves({ verbose: true });
                if (!moves.length) return null;

                let best = null, bestVal = -Infinity;
                for (const m of moves) {
                    this._chess.move(m);
                    const val = -this._negamax(depth - 1, -Infinity, Infinity);
                    this._chess.undo();
                    if (val > bestVal) { bestVal = val; best = m; }
                }
                return best; // verbose move object with .from and .to
            }

            _negamax(depth, alpha, beta) {
                if (depth === 0 || this._chess.game_over()) return this._eval();
                for (const m of this._chess.moves({ verbose: true })) {
                    this._chess.move(m);
                    const val = -this._negamax(depth - 1, -beta, -alpha);
                    this._chess.undo();
                    if (val >= beta) return beta;   // beta cut-off
                    if (val > alpha) alpha = val;
                }
                return alpha;
            }

            // Evaluation relative to the side to move (positive = good for mover)
            _eval() {
                if (this._chess.in_checkmate()) return -100000;
                if (this._chess.in_draw())      return 0;
                const weights = { p:100, n:320, b:330, r:500, q:900, k:0 };
                const turn = this._chess.turn();
                let score = 0;
                for (const row of this._chess.board()) {
                    for (const p of row) {
                        if (!p) continue;
                        score += p.color === turn ? weights[p.type] : -weights[p.type];
                    }
                }
                return score;
            }
        }

        // ── ChessUI: rendering and input handling ────────────────────────────
        class ChessUI {
            constructor() {
                this.game           = new ChessGame();
                this.selectedSquare = null;   // algebraic, e.g. "e2"
                this.legalMoves     = [];     // verbose moves from selectedSquare
                this.dragFrom       = null;   // square being dragged from
                this._buildBoard();
                this._bindEvents();
            }

            // Map grid position → algebraic square name
            // row 0 (top of grid) = rank 8, col 0 (left) = file a
            _alg(row, col) {
                return String.fromCharCode(97 + col) + (8 - row);
            }

            _buildBoard() {
                const boardEl = document.getElementById('chess-board');
                boardEl.innerHTML = '';
                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        const sq = document.createElement('div');
                        sq.className    = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                        sq.dataset.sq   = this._alg(r, c);
                        boardEl.appendChild(sq);
                    }
                }
            }

            _bindEvents() {
                const boardEl = document.getElementById('chess-board');
                boardEl.addEventListener('click',      e => this._onClick(e));
                boardEl.addEventListener('mousedown',  e => this._onDragStart(e));
                boardEl.addEventListener('mouseup',    e => this._onDragEnd(e));
                boardEl.addEventListener('touchstart', e => this._onTouchStart(e), { passive: false });
                boardEl.addEventListener('touchend',   e => this._onTouchEnd(e),   { passive: false });
            }

            // ── Rendering ─────────────────────────────────────────────────────
            render() {
                const board2d = this.game.board();

                document.querySelectorAll('.square').forEach(el => {
                    const sq    = el.dataset.sq;
                    // Decode row/col from square name
                    const col   = sq.charCodeAt(0) - 97;
                    const row   = 8 - parseInt(sq[1]);
                    const piece = board2d[row][col];

                    // Update piece symbol
                    el.innerHTML = piece
                        ? `<span class="piece">${SYMBOLS[piece.color][piece.type]}</span>`
                        : '';

                    // Reset decorations
                    el.classList.remove('selected', 'last-move', 'check', 'possible-move', 'has-piece');

                    // Last-move highlight
                    if (this.game.lastMove) {
                        if (sq === this.game.lastMove.from || sq === this.game.lastMove.to) {
                            el.classList.add('last-move');
                        }
                    }

                    // Check highlight (king of side to move)
                    if (this.game.inCheck() && piece && piece.type === 'k' && piece.color === this.game.turn()) {
                        el.classList.add('check');
                    }

                    // Selection
                    if (sq === this.selectedSquare) {
                        el.classList.add('selected');
                    }

                    // Legal move dots / capture rings
                    if (this.legalMoves.some(m => m.to === sq)) {
                        el.classList.add('possible-move');
                        if (piece) el.classList.add('has-piece');
                    }
                });

                this._updateStatus();
                this._updateHistory();
            }

            _updateStatus() {
                document.getElementById('game-status').textContent = this.game.statusText();
                const btn = document.getElementById('ai-move-btn');
                const showBtn = this.game.gameMode === 'ai'
                    && this.game.turn() === 'b'
                    && !this.game.gameOver();
                btn.style.display = showBtn ? 'inline-block' : 'none';
            }

            _updateHistory() {
                const el = document.getElementById('move-history');
                el.innerHTML = '';
                this.game.moveHistory.forEach((san, i) => {
                    const item = document.createElement('span');
                    item.className = `move-item ${i % 2 === 0 ? 'white-move' : 'black-move'}`;
                    item.textContent = i % 2 === 0 ? `${Math.floor(i / 2) + 1}. ${san}` : san;
                    el.appendChild(item);
                });
                el.scrollTop = el.scrollHeight;
            }

            // ── Click handling ────────────────────────────────────────────────
            _onClick(e) {
                if (this.dragFrom) return; // Drag-end handled separately
                const el = e.target.closest('[data-sq]');
                if (!el) return;
                this._handleSquareActivation(el.dataset.sq);
            }

            _handleSquareActivation(sq) {
                if (this.game.gameOver()) return;
                if (this.game.gameMode === 'ai' && this.game.turn() === 'b') return;

                if (!this.selectedSquare) {
                    // Select a piece that belongs to the player to move
                    const board2d = this.game.board();
                    const col = sq.charCodeAt(0) - 97;
                    const row = 8 - parseInt(sq[1]);
                    const piece = board2d[row][col];
                    if (piece && piece.color === this.game.turn()) {
                        this.selectedSquare = sq;
                        this.legalMoves     = this.game.legalMovesFrom(sq);
                        this.render();
                    }
                } else {
                    if (sq === this.selectedSquare) {
                        // Deselect
                        this.selectedSquare = null;
                        this.legalMoves     = [];
                        this.render();
                        return;
                    }

                    const isLegal = this.legalMoves.some(m => m.to === sq);
                    if (isLegal) {
                        this._applyMove(this.selectedSquare, sq);
                    } else {
                        // Try to switch selection to the new square
                        const board2d = this.game.board();
                        const col = sq.charCodeAt(0) - 97;
                        const row = 8 - parseInt(sq[1]);
                        const piece = board2d[row][col];
                        if (piece && piece.color === this.game.turn()) {
                            this.selectedSquare = sq;
                            this.legalMoves     = this.game.legalMovesFrom(sq);
                        } else {
                            this.selectedSquare = null;
                            this.legalMoves     = [];
                        }
                        this.render();
                    }
                }
            }

            _applyMove(from, to) {
                const moved = this.game.makeMove(from, to);
                this.selectedSquare = null;
                this.legalMoves     = [];
                this.render();
                if (moved && this.game.gameMode === 'ai' && !this.game.gameOver()) {
                    setTimeout(() => this._triggerAI(), 400);
                }
            }

            // ── AI ────────────────────────────────────────────────────────────
            _triggerAI() {
                if (this.game.gameMode !== 'ai') return;
                if (this.game.turn() !== 'b')    return;
                if (this.game.gameOver())         return;
                const move = this.game.getAIMove();
                if (move) this._applyMove(move.from, move.to);
            }

            // ── Drag & drop ───────────────────────────────────────────────────
            _onDragStart(e) {
                const el = e.target.closest('[data-sq]');
                if (!el) return;
                if (this.game.gameMode === 'ai' && this.game.turn() === 'b') return;
                const board2d = this.game.board();
                const sq  = el.dataset.sq;
                const col = sq.charCodeAt(0) - 97;
                const row = 8 - parseInt(sq[1]);
                const piece = board2d[row][col];
                if (piece && piece.color === this.game.turn()) {
                    this.dragFrom = sq;
                    // Pre-select so legal moves are shown during drag
                    this.selectedSquare = sq;
                    this.legalMoves     = this.game.legalMovesFrom(sq);
                    this.render();
                    e.preventDefault();
                }
            }

            _onDragEnd(e) {
                if (!this.dragFrom) return;
                const target = document.elementFromPoint(e.clientX, e.clientY);
                const el     = target?.closest('[data-sq]');
                const to     = el?.dataset.sq;

                if (to && to !== this.dragFrom && this.legalMoves.some(m => m.to === to)) {
                    this._applyMove(this.dragFrom, to);
                } else {
                    this.selectedSquare = null;
                    this.legalMoves     = [];
                    this.render();
                }
                this.dragFrom = null;
            }

            _onTouchStart(e) {
                e.preventDefault();
                const touch = e.touches[0];
                const el = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('[data-sq]');
                if (el) this._handleSquareActivation(el.dataset.sq);
            }

            _onTouchEnd(e) { e.preventDefault(); }
        }

        // ── Bootstrap & global helpers ────────────────────────────────────────
        let ui;

        function initGame() {
            ui = new ChessUI();
            ui.render();
        }

        function newGame() {
            const mode = ui.game.gameMode;
            const diff = ui.game.difficulty;
            ui.game.reset();
            ui.selectedSquare = null;
            ui.legalMoves     = [];
            ui.dragFrom       = null;
            // Re-apply settings
            ui.game.gameMode  = mode;
            ui.game.difficulty = diff;
            ui.render();
        }

        function setGameMode(mode, e) {
            ui.game.gameMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            ui._updateStatus();
        }

        function makeAIMove() { ui._triggerAI(); }

        function undoMove() {
            ui.game.undo();
            // In AI mode, undo the AI's move too so it's the human's turn
            if (ui.game.gameMode === 'ai' && ui.game.turn() === 'b') {
                ui.game.undo();
            }
            ui.selectedSquare = null;
            ui.legalMoves     = [];
            ui.render();
        }

        function changeDifficulty() {
            ui.game.difficulty = document.getElementById('ai-difficulty').value;
        }

        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
